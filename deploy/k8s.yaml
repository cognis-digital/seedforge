apiVersion: apps/v1
kind: Deployment
metadata: { name: seedforge, labels: { app: seedforge } }
spec:
  replicas: 1
  selector: { matchLabels: { app: seedforge } }
  template:
    metadata: { labels: { app: seedforge } }
    spec:
      containers:
        - name: seedforge
          image: ghcr.io/cognis-digital/seedforge:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: seedforge }
spec:
  selector: { app: seedforge }
  ports: [{ port: 80, targetPort: 8000 }]
